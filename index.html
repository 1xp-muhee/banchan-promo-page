<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>도쿄반찬 | 사진 속 반찬 모음</title>
  <style>
    :root{--line:#eaeaea;--text:#111;--muted:#666}
    *{box-sizing:border-box} body{margin:0;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif}
    .wrap{max-width:980px;margin:0 auto;padding:0 16px}
    header{border-bottom:1px solid var(--line)} .top{height:62px;display:flex;align-items:center;justify-content:space-between}
    .logo{font-weight:800}
    main{padding:28px 0 40px}
    h1{margin:0 0 8px;font-size:30px} .sub{margin:0 0 18px;color:var(--muted)}
    .bgm{border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:18px}
    .grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
    .card{border:1px solid var(--line);border-radius:10px;overflow:hidden;background:#fff}
    .card img{width:100%;display:block;aspect-ratio:1/1;object-fit:cover}
    .meta{padding:9px 10px;font-size:13px;color:#444}
    footer{border-top:1px solid var(--line);padding:14px 0 24px;color:#888;font-size:12px}
    @media (max-width:800px){.grid{grid-template-columns:repeat(2,minmax(0,1fr));}}
  </style>
</head>
<body>
<header><div class="wrap top"><div class="logo">도쿄반찬</div><div style="font-size:12px;color:#777">사진 기반 메뉴</div></div></header>
<main class="wrap">

  <div class="bgm">

  </div>
